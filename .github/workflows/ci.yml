name: Lite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Validate macOS installer syntax
        if: runner.os == 'macOS'
        run: bash -n scripts/install-macos.sh
      - name: Validate Windows installer syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "scripts/install-windows.ps1",
            [ref]$tokens,
            [ref]$errors
          ) > $null
          if ($errors.Count) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - run: bun run typecheck
      - run: bun run test
